  xss: "(?i)(<script>|javascript:|onerror=)"
  lfi: "(?i)(\\.\\./\\.\\./|/etc/passwd|/windows/win\\.ini)"
  bad_user_agents: "(?i)(sqlmap|nmap|nikto|masscan|zgrab)"
  bad_paths:
    - ".env"
    - ".git"
    - "config.json"
